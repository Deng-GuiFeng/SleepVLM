# W4A16 Post-Training Quantization using Intel AutoRound
#
# Quantizes the language model weights to 4-bit integers while
# keeping activations in 16-bit floating point (W4A16).
# Vision encoder and lm_head are kept in FP16 precision.

model_path: outputs/phase2_sft/lora_merge/best
output_dir: outputs/phase2_sft/quantized_w4a16
calibration_jsonl: data/phase2_sft/train.jsonl
image_base_dir: data

# Quantization parameters
bits: 4
group_size: 128
num_samples: 5000    # Stratified by sleep stage
iters: 200
seqlen: 2048
seed: 42
